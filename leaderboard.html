<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playing11 | Leaderboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="dashboard-page">

  <nav class="navbar">
    <div class="nav-logo">🏏 Playing<span>11</span></div>
    <ul class="nav-links">
      <li><a href="dashboard.html">🏠 Home</a></li>
      <li><a href="leaderboard.html" class="active">🏆 Leaderboard</a></li>
    </ul>
    <div class="nav-right">
      <span class="nav-username" id="nav-username">👤 Player</span>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <nav class="bottom-nav">
    <a href="dashboard.html">🏠<span>Home</span></a>
    <a href="leaderboard.html" class="active">🏆<span>Board</span></a>
    <a href="#" onclick="handleLogout()">🚪<span>Logout</span></a>
  </nav>

  <main class="dashboard-main">

    <div class="page-header">
      <h1>🏆 Leaderboard</h1>
      <p id="lb-subtitle">Top fantasy cricket predictors</p>
    </div>

    <div id="match-status-info"></div>

    <div class="podium-section" id="podium-section">
      <div class="lb-loading">⏳ Loading rankings...</div>
    </div>

    <div id="your-rank-card"></div>

    <div class="lb-table-card">
      <div class="lb-table-header">
        <span>Rank</span>
        <span>Player</span>
        <span>Team</span>
        <span>Points</span>
      </div>
      <div id="leaderboard-list">
        <div class="lb-loading">⏳ Loading...</div>
      </div>
    </div>

  </main>

  <!-- VIEW TEAM MODAL -->
  <div id="view-team-modal" class="rules-modal hidden">
    <div class="rules-modal-box">
      <div class="rules-modal-header">
        <h3 id="modal-team-title">⭐ Team</h3>
        <button onclick="closeTeamModal()">✕</button>
      </div>
      <div class="rules-modal-content" id="modal-team-content"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"
    import { getFirestore, collection, getDocs, doc,
      getDoc, query, where }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

    const firebaseConfig = {
      apiKey: "AIzaSyAEiYnuVdMgUUkVSAy3yHGdfEC9L-s1JiY",
      authDomain: "predict11-fc129.firebaseapp.com",
      projectId: "predict11-fc129",
      storageBucket: "predict11-fc129.firebasestorage.app",
      messagingSenderId: "634146309603",
      appId: "1:634146309603:web:6be9a43a1f54f766134cd6"
    }

    const app = initializeApp(firebaseConfig)
    const auth = getAuth(app)
    const db = getFirestore(app)

    let currentUser = null
    let isMatchLive = false
    let selectedMatchId = null
    let selectedMatchStatus = null

    // ===== AUTH =====
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return }
      currentUser = user
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid))
        if (userDoc.exists()) {
          document.getElementById('nav-username').textContent =
            '👤 ' + (userDoc.data().username || user.email.split('@')[0])
        }
      } catch(e) {}

      const params = new URLSearchParams(window.location.search)
      const matchIdFromUrl = params.get('matchId')
      await loadMatch(matchIdFromUrl)
    })

    // ===== LOAD MATCH =====
    async function loadMatch(matchId) {
      try {
        const snap = await getDocs(collection(db, 'matches'))
        const allMatches = []
        snap.forEach(d => allMatches.push({ id: d.id, ...d.data() }))

        let match = null

        if (matchId) {
          match = allMatches.find(m => m.id === matchId)
        }

        // If no matchId in URL → find live first, then latest completed
        if (!match) {
          match = allMatches.find(m => m.status === 'live')
        }
        if (!match) {
          // Get latest completed
          const completed = allMatches.filter(m => m.status === 'completed')
          match = completed.length > 0 ? completed[completed.length - 1] : null
        }
        if (!match && allMatches.length > 0) {
          match = allMatches[0]
        }

        if (!match) {
          document.getElementById('podium-section').innerHTML =
            '<div class="lb-loading">No matches found!</div>'
          return
        }

        selectedMatchId = match.id
        selectedMatchStatus = match.status
        isMatchLive = match.status === 'live'

        // Update subtitle
        document.getElementById('lb-subtitle').textContent =
          `${match.team1Name} vs ${match.team2Name} • ${match.matchType || 'T20'}`

        // Show banner
        const info = document.getElementById('match-status-info')
        if (match.status === 'live') {
          info.innerHTML = `
            <div class="lb-status-banner lb-status-live">
              <span>🔴 Match is LIVE!</span>
              <span>Opponent teams are now visible</span>
            </div>`
        } else if (match.status === 'completed') {
          info.innerHTML = `
            <div class="lb-status-banner lb-status-completed-banner">
              <span>✅ Match Completed</span>
              <span>Final leaderboard results</span>
            </div>`
        } else {
          info.innerHTML = `
            <div class="lb-status-banner lb-status-upcoming">
              <span>⏳ Match not live yet</span>
              <span>Opponent teams hidden until match goes live</span>
            </div>`
        }

        loadLeaderboard(match.id, match.status)

      } catch(e) { console.error(e) }
    }

    // ===== LOAD LEADERBOARD =====
    async function loadLeaderboard(matchId, matchStatus) {
      document.getElementById('podium-section').innerHTML =
        '<div class="lb-loading">⏳ Loading...</div>'
      document.getElementById('leaderboard-list').innerHTML =
        '<div class="lb-loading">⏳ Loading...</div>'
      document.getElementById('your-rank-card').innerHTML = ''

      try {
        // ✅ Fetch predictions for THIS match only
        const predsSnap = await getDocs(
          query(collection(db, 'predictions'),
            where('matchId', '==', matchId))
        )

        if (predsSnap.empty) {
          document.getElementById('podium-section').innerHTML =
            '<div class="lb-loading">No predictions for this match yet!</div>'
          document.getElementById('leaderboard-list').innerHTML =
            '<div class="lb-loading">Be the first to predict! 🎯</div>'
          return
        }

        // ✅ Keep ONLY latest prediction per user — remove duplicates
        const predsByUser = {}
        predsSnap.forEach(d => {
          const p = d.data()
          if (!p.userId) return

          if (predsByUser[p.userId]) {
            const existingTime = predsByUser[p.userId].createdAt?.seconds || 0
            const newTime = p.createdAt?.seconds || 0
            if (newTime > existingTime) {
              predsByUser[p.userId] = { ...p, docId: d.id }
            }
          } else {
            predsByUser[p.userId] = { ...p, docId: d.id }
          }
        })

        // ✅ Fetch ALL fresh player points in ONE call
        const playersSnap = await getDocs(collection(db, 'players'))
        const freshPoints = {}
        playersSnap.forEach(d => {
          freshPoints[d.id] = parseInt(d.data().points) || 0
        })

        // ✅ Calculate totals with fresh points
        const ranked = []
        for (const uid of Object.keys(predsByUser)) {
          const p = predsByUser[uid]
          let total = 0

          // Regular players with captain/vc multipliers
          if (p.players) {
            p.players.forEach(pl => {
              let pts = freshPoints[pl.id] !== undefined
                ? freshPoints[pl.id]
                : parseInt(pl.points) || 0
              if (pl.id === p.captainId) pts = pts * 2
              else if (pl.id === p.vcId) pts = pts * 1.5
              total += pts
            })
          }

          // Impact player
          if (p.impactPlayer && p.impactPlayer.id) {
            total += freshPoints[p.impactPlayer.id] !== undefined
              ? freshPoints[p.impactPlayer.id]
              : parseInt(p.impactPlayer.points) || 0
          }

          // Get username
          try {
            const userDoc = await getDoc(doc(db, 'users', uid))
            const userData = userDoc.exists() ? userDoc.data() : {}
            ranked.push({
              id: uid,
              username: userData.username ||
                p.userEmail?.split('@')[0] || 'Player',
              totalPts: total,
              players: p.players,
              captainId: p.captainId,
              vcId: p.vcId,
              impactPlayer: p.impactPlayer,
              team1: p.team1,
              team2: p.team2
            })
          } catch(e) {
            ranked.push({
              id: uid,
              username: p.userEmail?.split('@')[0] || 'Player',
              totalPts: total,
              players: p.players,
              captainId: p.captainId,
              vcId: p.vcId,
              impactPlayer: p.impactPlayer,
              team1: p.team1,
              team2: p.team2
            })
          }
        }

        // ✅ Sort highest first
        ranked.sort((a, b) => b.totalPts - a.totalPts)

        renderPodium(ranked)
        renderYourRank(ranked)
        renderTable(ranked, matchStatus)

      } catch(e) {
        console.error(e)
        document.getElementById('leaderboard-list').innerHTML =
          `<div class="lb-loading">❌ ${e.message}</div>`
      }
    }

    // ===== RENDER PODIUM =====
    function renderPodium(ranked) {
      const section = document.getElementById('podium-section')
      if (ranked.length === 0) {
        section.innerHTML = '<div class="lb-loading">No players yet!</div>'
        return
      }

      const medals = ['🥇', '🥈', '🥉']
      const heights = ['90px', '65px', '50px']
      const colors = [
        'linear-gradient(180deg, #f9f047, #ff9a3c)',
        'linear-gradient(180deg, #c8d6e5, #8395a7)',
        'linear-gradient(180deg, #cd7f32, #a0522d)'
      ]
      const order = ranked.length >= 3 ? [1, 0, 2] :
                    ranked.length === 2 ? [1, 0] : [0]

      let html = '<div class="lb-podium">'
      order.forEach(i => {
        if (!ranked[i]) return
        const u = ranked[i]
        const isYou = u.id === currentUser.uid
        const isFirst = i === 0

        html += `
          <div class="lb-podium-player
            ${isFirst ? 'lb-podium-first' : ''}
            ${isYou ? 'lb-podium-you' : ''}">
            <div class="lb-podium-medal">${medals[i]}</div>
            <div class="lb-podium-avatar
              ${isFirst ? 'lb-podium-avatar-gold' : ''}">
              ${u.username[0].toUpperCase()}
            </div>
            <div class="lb-podium-name">
              ${u.username}${isFirst ? ' 👑' : ''}
            </div>
            ${isYou
              ? '<div class="lb-podium-you-tag">👈 You</div>'
              : ''}
            <div class="lb-podium-pts">${u.totalPts} pts</div>
            <div class="lb-podium-stand"
              style="height:${heights[i]};background:${colors[i]}">
            </div>
          </div>`
      })
      html += '</div>'
      section.innerHTML = html
    }

    // ===== RENDER YOUR RANK =====
    function renderYourRank(ranked) {
      const card = document.getElementById('your-rank-card')
      const idx = ranked.findIndex(u => u.id === currentUser.uid)

      if (idx === -1) {
        card.innerHTML = `
          <div class="lb-your-rank-box">
            <p style="color:rgba(255,255,255,0.7);
              font-size:0.88rem;text-align:center;width:100%">
              🎯 You haven't predicted this match yet!
            </p>
          </div>`
        return
      }

      const you = ranked[idx]
      const rank = idx + 1
      const rankEmoji = rank === 1 ? '🥇' :
                        rank === 2 ? '🥈' :
                        rank === 3 ? '🥉' : `#${rank}`

      card.innerHTML = `
        <div class="lb-your-rank-box">
          <div class="lb-your-rank-left">
            <span class="lb-your-rank-label">Your Rank</span>
            <span class="lb-your-rank-num">${rankEmoji}</span>
          </div>
          <div class="lb-your-rank-mid">
            <span class="lb-your-rank-name">
              ${you.username}
              ${rank === 1 ? ' 👑 Winner!' : ''}
            </span>
            <span class="lb-your-rank-sub">@${you.username}</span>
          </div>
          <div class="lb-your-rank-right">
            <span class="lb-your-rank-pts">${you.totalPts}</span>
            <span class="lb-your-rank-sub">Points</span>
          </div>
        </div>`
    }

    // ===== RENDER TABLE =====
    function renderTable(ranked, matchStatus) {
      const list = document.getElementById('leaderboard-list')

      // ✅ Teams visible for live and completed matches
      const canViewTeams = matchStatus === 'live' ||
                           matchStatus === 'completed'

      if (ranked.length === 0) {
        list.innerHTML = '<div class="lb-loading">No players yet!</div>'
        return
      }

      let html = ''
      ranked.forEach((u, i) => {
        const rank = i + 1
        const isYou = u.id === currentUser.uid
        const isFirst = rank === 1
        const rankDisplay = rank === 1 ? '🥇' :
                            rank === 2 ? '🥈' :
                            rank === 3 ? '🥉' : `#${rank}`

        html += `
          <div class="lb-table-row
            ${isYou ? 'lb-row-you' : ''}
            ${isFirst ? 'lb-row-first' : ''}">

            <span class="lb-table-rank">${rankDisplay}</span>

            <div class="lb-table-player">
              <div class="lb-table-avatar
                ${isFirst ? 'lb-avatar-gold' : ''}">
                ${u.username[0].toUpperCase()}
              </div>
              <div class="lb-table-info">
                <span class="lb-table-name">
                  ${u.username}
                  ${isFirst
                    ? '<span class="lb-winner-tag">👑 Winner</span>'
                    : ''}
                  ${isYou
                    ? '<span class="lb-you-tag">👈 You</span>'
                    : ''}
                </span>
              </div>
            </div>

            <span class="lb-table-team">
              ${canViewTeams || isYou
                ? `<button class="btn-view-lb-team"
                    onclick="viewTeam('${u.id}','${u.username}')">
                    👁️ Team
                   </button>`
                : `<span style="color:rgba(255,255,255,0.3);
                    font-size:0.8rem">🔒</span>`
              }
            </span>

            <span class="lb-table-pts">${u.totalPts}</span>
          </div>`
      })

      list.innerHTML = html
    }

    // ===== VIEW TEAM MODAL =====
    window.viewTeam = async function(userId, username) {
      const modal = document.getElementById('view-team-modal')
      const content = document.getElementById('modal-team-content')
      const title = document.getElementById('modal-team-title')

      title.textContent = `⭐ ${username}'s Team`
      content.innerHTML = '<div class="lb-loading">⏳ Loading...</div>'
      modal.classList.remove('hidden')

      try {
        // ✅ Fetch prediction for specific match
        const q = query(
          collection(db, 'predictions'),
          where('userId', '==', userId),
          where('matchId', '==', selectedMatchId)
        )
        const snap = await getDocs(q)

        if (snap.empty) {
          content.innerHTML =
            '<p style="color:white;text-align:center;padding:20px">No team found!</p>'
          return
        }

        // ✅ Get latest prediction
        let pred = snap.docs[0].data()
        snap.docs.forEach(d => {
          const p = d.data()
          const existTime = pred.createdAt?.seconds || 0
          const newTime = p.createdAt?.seconds || 0
          if (newTime > existTime) pred = p
        })

        function roleIcon(r) {
          return r === 'Batsman' ? '🏏' :
                 r === 'Bowler' ? '🤾' :
                 r === 'All-Rounder' ? '🌟' : '🧤'
        }

        let html = `
          <div style="text-align:center;padding:10px 14px;
            background:rgba(255,255,255,0.08);
            border-radius:12px;margin-bottom:14px;
            font-weight:700;color:white;font-size:0.95rem">
            ${pred.team1} vs ${pred.team2}
          </div>`

        let total = 0

        if (pred.players) {
          for (const p of pred.players) {
            const isCaptain = pred.captainId === p.id
            const isVC = pred.vcId === p.id

            // ✅ Fresh points from Firebase
            const playerDoc = await getDoc(doc(db, 'players', p.id))
            let pts = playerDoc.exists()
              ? parseInt(playerDoc.data().points) || 0
              : parseInt(p.points) || 0

            if (isCaptain) pts = pts * 2
            else if (isVC) pts = pts * 1.5
            total += pts

            const roleColor = p.role === 'Batsman' ? '#f9f047' :
                              p.role === 'Bowler' ? '#38d4c8' :
                              p.role === 'All-Rounder' ? '#ff9a3c' : '#ff6ec7'

            html += `
              <div style="display:flex;align-items:center;gap:12px;
                padding:10px 14px;
                background:rgba(255,255,255,0.08);
                border:1px solid rgba(255,255,255,0.12);
                border-radius:12px;margin-bottom:8px;
                border-left:3px solid ${roleColor}">
                <span style="font-size:1.3rem">${roleIcon(p.role)}</span>
                <div style="flex:1">
                  <div style="font-weight:700;font-size:0.88rem;color:white">
                    ${p.name}
                    ${isCaptain
                      ? '<span style="background:#f9f047;color:#000;font-size:0.6rem;padding:1px 6px;border-radius:6px;margin-left:4px;font-weight:900">C</span>'
                      : ''}
                    ${isVC
                      ? '<span style="background:#38d4c8;color:#000;font-size:0.6rem;padding:1px 6px;border-radius:6px;margin-left:4px;font-weight:900">VC</span>'
                      : ''}
                  </div>
                  <div style="font-size:0.7rem;color:${roleColor}">
                    ${p.role}
                  </div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:0.88rem;font-weight:700;
                    color:#43e97b">${pts} pts</div>
                  ${isCaptain
                    ? '<div style="font-size:0.62rem;color:#f9f047">(2x)</div>'
                    : isVC
                    ? '<div style="font-size:0.62rem;color:#38d4c8">(1.5x)</div>'
                    : ''}
                </div>
              </div>`
          }
        }

        // Impact player
        if (pred.impactPlayer && pred.impactPlayer.id) {
          const impDoc = await getDoc(
            doc(db, 'players', pred.impactPlayer.id)
          )
          const impPts = impDoc.exists()
            ? parseInt(impDoc.data().points) || 0
            : parseInt(pred.impactPlayer.points) || 0
          total += impPts

          html += `
            <div style="display:flex;align-items:center;gap:12px;
              padding:10px 14px;
              background:rgba(249,240,71,0.1);
              border:1px solid rgba(249,240,71,0.3);
              border-radius:12px;margin-bottom:8px">
              <span style="font-size:1.3rem">⚡</span>
              <div style="flex:1">
                <div style="font-weight:700;font-size:0.88rem;color:white">
                  ${pred.impactPlayer.name}
                  <span style="background:#ff6ec7;color:white;
                    font-size:0.6rem;padding:1px 6px;
                    border-radius:6px;margin-left:4px">⚡ Impact</span>
                </div>
                <div style="font-size:0.7rem;color:#f9f047">
                  ${pred.impactPlayer.role}
                </div>
              </div>
              <div style="font-size:0.88rem;font-weight:700;color:#43e97b">
                ${impPts} pts
              </div>
            </div>`
        }

        // Total
        html += `
          <div style="display:flex;justify-content:space-between;
            align-items:center;padding:14px 16px;
            background:rgba(255,255,255,0.08);
            border-radius:12px;margin-top:8px;
            font-weight:700;color:white;font-size:0.95rem">
            <span>🏆 Total Points</span>
            <span style="font-size:1.5rem;font-weight:800;
              background:linear-gradient(135deg,#ff6ec7,#f9f047);
              -webkit-background-clip:text;
              -webkit-text-fill-color:transparent;
              background-clip:text">${total}</span>
          </div>`

        content.innerHTML = html

      } catch(e) {
        console.error(e)
        content.innerHTML =
          `<p style="color:white;text-align:center;padding:20px">
            ❌ ${e.message}
          </p>`
      }
    }

    window.closeTeamModal = function() {
      document.getElementById('view-team-modal').classList.add('hidden')
    }

    document.getElementById('view-team-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('view-team-modal')) {
        closeTeamModal()
      }
    })

    window.handleLogout = async function() {
      await signOut(auth)
      window.location.href = 'login.html'
    }
  </script>

</body>
</html>
