<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playing11 | Forgot Password</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <!-- ADMIN BUTTON TOP RIGHT -->
  <div class="admin-access">
    <a href="admin.html" class="btn-admin">⚙️ Admin</a>
  </div>

  <!-- BACKGROUND DECORATION -->
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <!-- WRAPPER -->
  <div class="login-wrapper">

    <!-- LOGO -->
    <div class="login-logo">
      <span class="logo-icon">🏏</span>
      <h1 class="logo-text">Playing<span>11</span></h1>
      <p class="logo-tagline">Your Fantasy Cricket Arena</p>
    </div>

    <!-- FORGOT PASSWORD CARD -->
    <div class="login-card">

      <!-- STEP 1: Enter Email -->
      <div id="step-1">
        <div class="forgot-icon">🔑</div>
        <h2>Forgot Password?</h2>
        <p class="card-subtitle">No worries! Enter your email and
          we'll send you a reset link.</p>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="email"
              placeholder="Enter your registered email" />
          </div>
        </div>

        <button class="btn-primary" id="reset-btn">
          Send Reset Link
        </button>

        <p id="msg" class="form-msg"></p>

        <div class="form-links center-link">
          <a href="login.html">← Back to Login</a>
        </div>
      </div>

      <!-- STEP 2: Success State -->
      <div id="step-2" class="hidden">
        <div class="success-state">
          <div class="success-icon">📬</div>
          <h2>Check Your Email!</h2>
          <p class="card-subtitle">
            We've sent a password reset link to<br/>
            <span id="sent-email" class="highlight-email"></span>
          </p>
          <p class="resend-text">Didn't receive it?
            <span class="resend-link" id="resend-btn">Resend Email</span>
          </p>
          <button class="btn-primary"
            onclick="window.location.href='login.html'">
            Back to Login
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
    import { getAuth, sendPasswordResetEmail }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

    // ✅ FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAEiYnuVdMgUUkVSAy3yHGdfEC9L-s1JiY",
      authDomain: "predict11-fc129.firebaseapp.com",
      projectId: "predict11-fc129",
      storageBucket: "predict11-fc129.firebasestorage.app",
      messagingSenderId: "634146309603",
      appId: "1:634146309603:web:6be9a43a1f54f766134cd6"
    }

    const app = initializeApp(firebaseConfig)
    const auth = getAuth(app)

    const msg = document.getElementById('msg')
    const btn = document.getElementById('reset-btn')

    // ===== SEND RESET EMAIL =====
    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim()

      if (!email) {
        msg.textContent = '❌ Please enter your email address!'
        msg.className = 'form-msg error'
        return
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
      if (!emailRegex.test(email)) {
        msg.textContent = '❌ Please enter a valid email address!'
        msg.className = 'form-msg error'
        return
      }

      msg.textContent = '⏳ Sending reset link...'
      msg.className = 'form-msg success'
      btn.disabled = true
      btn.textContent = '⏳ Sending...'

      try {
        await sendPasswordResetEmail(auth, email, {
          // ✅ Updated with your Vercel domain
          url: 'https://playing11-sigma.vercel.app/login.html'
        })

        document.getElementById('sent-email').textContent = email
        document.getElementById('step-1').classList.add('hidden')
        document.getElementById('step-2').classList.remove('hidden')

      } catch (error) {
        btn.disabled = false
        btn.textContent = 'Send Reset Link'

        switch (error.code) {
          case 'auth/user-not-found':
            msg.textContent = '❌ No account found with this email!'
            break
          case 'auth/invalid-email':
            msg.textContent = '❌ Invalid email address!'
            break
          case 'auth/too-many-requests':
            msg.textContent = '❌ Too many attempts. Try again later!'
            break
          default:
            msg.textContent = '❌ ' + error.message
        }
        msg.className = 'form-msg error'
      }
    })

    // ===== RESEND EMAIL =====
    document.getElementById('resend-btn').addEventListener('click', async () => {
      const email = document.getElementById('sent-email').textContent
      const resendBtn = document.getElementById('resend-btn')

      try {
        await sendPasswordResetEmail(auth, email, {
          url: 'https://playing11-sigma.vercel.app/login.html'
        })
        resendBtn.textContent = '✅ Sent!'
        resendBtn.style.color = '#43e97b'
        resendBtn.style.pointerEvents = 'none'

        setTimeout(() => {
          resendBtn.textContent = 'Resend Email'
          resendBtn.style.color = ''
          resendBtn.style.pointerEvents = ''
        }, 3000)

      } catch(e) {
        console.error(e)
      }
    })
  </script>

</body>
</html>
