<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playing11 | Forgot Password</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <!-- ADMIN BUTTON TOP RIGHT -->
  <div class="admin-access">
    <a href="admin.html" class="btn-admin">⚙️ Admin</a>
  </div>

  <!-- BACKGROUND DECORATION -->
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <!-- WRAPPER -->
  <div class="login-wrapper">

    <!-- LOGO -->
    <div class="login-logo">
      <span class="logo-icon">🏏</span>
      <h1 class="logo-text">Predict<span>11</span></h1>
      <p class="logo-tagline">Your Fantasy Cricket Arena</p>
    </div>

    <!-- FORGOT PASSWORD CARD -->
    <div class="login-card">

      <!-- STEP 1: Enter Email -->
      <div id="step-1">
        <div class="forgot-icon">🔑</div>
        <h2>Forgot Password?</h2>
        <p class="card-subtitle">No worries! Enter your email and we'll send you a reset link.</p>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="email" placeholder="Enter your registered email" />
          </div>
        </div>

        <button class="btn-primary" onclick="handleForgotPassword()">
          Send Reset Link
        </button>

        <p id="msg" class="form-msg"></p>

        <div class="form-links center-link">
          <a href="login.html">← Back to Login</a>
        </div>
      </div>

      <!-- STEP 2: Success State -->
      <div id="step-2" class="hidden">
        <div class="success-state">
          <div class="success-icon">📬</div>
          <h2>Check Your Email!</h2>
          <p class="card-subtitle">We've sent a password reset link to<br/>
            <span id="sent-email" class="highlight-email"></span>
          </p>
          <p class="resend-text">Didn't receive it?
            <span class="resend-link" onclick="resendEmail()">Resend Email</span>
          </p>
          <button class="btn-primary" onclick="window.location.href='login.html'">
            Back to Login
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
